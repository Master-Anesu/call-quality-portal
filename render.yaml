services:
  - type: web
    name: call-quality-portal
    runtime: python
    plan: free
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 4
    envVars:
      - key: MCP_API_KEY
        sync: false
      - key: WORKSPACE_USER_ID
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: "2025-01-01-preview"
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: "trilogy-gpt-4.1"
      - key: AZURE_AD_TENANT_ID
        sync: false
      - key: AZURE_AD_CLIENT_ID
        sync: false
      - key: AZURE_AD_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABRICKS_HOST
        value: "https://dbc-8629faad-d1c2.cloud.databricks.com"
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_WAREHOUSE_ID
        value: "78eb07c6638f99bc"
      - key: PYTHON_VERSION
        value: "3.11.11"
